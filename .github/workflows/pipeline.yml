name: Pipeline

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python scripts/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: resultado
          path: |
            storage/processed
            planilhas/produtos_final.xlsx
            logs/
